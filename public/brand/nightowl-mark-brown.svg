<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 96" width="480" height="384">
  <!-- Nightowl Woodworks peeking-owl mark, filled brand version -->
  <g>
    <!-- Head dome peeking over the ledge, with ear tufts -->
    <path fill="#3a2a1c" d="M14 84 Q16 44 38 27 Q46 21 52 20 L49 10 Q55 15 58 19 Q59 18.6 60 18.6 Q61 18.6 62 19 Q65 15 71 10 L68 20 Q74 21 82 27 Q104 44 106 84 Z"/>
    <!-- Heavy brow band -->
    <path fill="#8a5a33" d="M16 47 Q40 28 57 39 Q60 41 63 39 Q80 28 104 47 Q82 40 64 47 Q60 49 56 47 Q38 40 16 47 Z"/>
    <!-- Eye rings -->
    <circle cx="41" cy="59" r="11.5" fill="#f5efe2"/>
    <circle cx="79" cy="59" r="11.5" fill="#f5efe2"/>
    <!-- Pupils, looking slightly inward like the brand logo -->
    <circle cx="44" cy="59" r="5" fill="#2a1c10"/>
    <circle cx="76" cy="59" r="5" fill="#2a1c10"/>
    <!-- Eye glints -->
    <circle cx="45.6" cy="57.2" r="1.5" fill="#f5efe2"/>
    <circle cx="77.6" cy="57.2" r="1.5" fill="#f5efe2"/>
    <!-- Beak -->
    <path fill="#2a1c10" d="M60 62 L55.5 72 Q60 76 64.5 72 Z"/>
    <!-- Eye flare lines -->
    <g stroke="#3a2a1c" stroke-width="2.4" stroke-linecap="round">
      <path d="M24 54 L30 56"/>
      <path d="M24.5 61 L30.5 61"/>
      <path d="M96 54 L90 56"/>
      <path d="M95.5 61 L89.5 61"/>
    </g>
    <!-- Ledge -->
    <rect x="8" y="84" width="104" height="5" rx="2.5" fill="#3a2a1c"/>
  </g>
</svg>
